<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CE-Cop Agent Links</title>
  <meta name="description" content="CE-Cop Agent social and product links.">
  <style>
    :root { color-scheme: dark; --ink:#0b151f; --panel:#111f2d; --text:#f7f9fc; --muted:#c8d3df; --gold:#e7b84b; --line:#2a3d52; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family: Inter, Segoe UI, Arial, sans-serif; background: radial-gradient(circle at 12% 0%, #213a61 0 22rem, transparent 22rem), linear-gradient(145deg, #08111a, #102033); color:var(--text); display:grid; place-items:center; padding:32px 18px; }
    main { width:min(560px, 100%); }
    .brand { display:flex; align-items:center; gap:16px; margin-bottom:28px; }
    .brand img { width:76px; height:76px; border-radius:20px; background:white; object-fit:contain; padding:7px; }
    h1 { font-size:clamp(34px, 8vw, 52px); line-height:1; margin:0 0 8px; letter-spacing:0; }
    p { color:var(--muted); font-size:18px; line-height:1.5; margin:0 0 24px; }
    .links { display:grid; gap:12px; }
    a.card { display:block; text-decoration:none; color:var(--text); background:rgba(17,31,45,.9); border:1px solid var(--line); border-radius:16px; padding:18px 20px; transition: transform .16s ease, border-color .16s ease; }
    a.card:hover { transform: translateY(-2px); border-color:var(--gold); }
    .label { display:block; font-weight:800; font-size:20px; margin-bottom:4px; }
    .hint { color:var(--muted); font-size:14px; }
    .cta { margin-top:18px; background:var(--gold); color:#0b151f; border-radius:16px; padding:18px 20px; font-weight:900; text-align:center; }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img src="../logo.png" alt="CE-Cop Agent logo">
      <div>
        <h1>CE-Cop Agent</h1>
        <p>24/7 lead response for real estate teams.</p>
      </div>
    </div>
    <div class="links" aria-label="CE-Cop Agent links">
      <a class="card" href="https://webnestam.github.io/CE-Cop-Agent/"><span class="label">Product site</span><span class="hint">See the CE-Cop Agent landing page</span></a>
      <a class="card" href="https://www.instagram.com/cecopagent/"><span class="label">Instagram</span><span class="hint">Follow @cecopagent</span></a>
      <a class="card" href="https://x.com/CECopAgent"><span class="label">X</span><span class="hint">Follow @CECopAgent</span></a>
      <a class="card" href="https://www.facebook.com/profile.php?id=61590925465782"><span class="label">Facebook</span><span class="hint">Visit the CE-Cop Agent page</span></a>
      <a class="card" href="https://github.com/webnestam/CE-Cop-Agent"><span class="label">GitHub</span><span class="hint">View product docs and source</span></a>
    </div>
    <div class="cta">DM AUDIT for a free lead response audit</div>
  </main>
</body>
</html>
